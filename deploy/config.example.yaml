server:
  # 容器内监听地址。Docker 部署保持 0.0.0.0。
  host: '0.0.0.0'
  # 容器内服务端口，需与 docker-compose.yml 的 target port 一致。
  port: 8080

api:
  # ChatGPT / Codex 上游 API 地址。
  base_url: 'https://chatgpt.com/backend-api'

database:
  # PostgreSQL 持久层。
  url: 'postgres://codex_proxy:codex_proxy@postgres:5432/codex_proxy'

redis:
  # Redis 仅承载可丢弃的运行态与缓存。
  url: 'redis://redis:6379/'

quota:
  # 账号额度刷新间隔，单位分钟。
  refresh_interval_minutes: 5
  # 调度时跳过已耗尽账号。
  skip_exhausted: true

tls:
  # 某些网络环境下可强制 HTTP/1.1；默认使用自动协商。
  force_http11: false

ws_pool:
  # 上游 WebSocket 连接池。
  enabled: true
  # 单个连接最大存活时间，单位毫秒。
  max_age_ms: 3300000
  # 每个账号最多保留的连接数。
  max_per_account: 8

fingerprint:
  # 上游请求指纹。通常保持默认，除非需要模拟其他客户端版本。
  originator: Codex Desktop
  app_version: '26.623.42026'
  build_number: '4514'
  platform: darwin
  arch: arm64
  chromium_version: '146'
  user_agent_template: Codex Desktop/{version} ({platform}; {arch})
  default_headers:
    - name: Accept-Encoding
      value: gzip, deflate, br, zstd
    - name: Accept-Language
      value: en-US,en;q=0.9
    - name: sec-ch-ua-mobile
      value: '?0'
    - name: sec-ch-ua-platform
      value: '"macOS"'
    - name: sec-fetch-site
      value: same-origin
    - name: sec-fetch-mode
      value: cors
    - name: sec-fetch-dest
      value: empty
  header_order:
    # 上游请求头顺序。通常保持默认。
    - authorization
    - chatgpt-account-id
    - originator
    - x-openai-internal-codex-residency
    - x-client-request-id
    - x-codex-installation-id
    - x-codex-turn-state
    - openai-beta
    - user-agent
    - sec-ch-ua
    - sec-ch-ua-mobile
    - sec-ch-ua-platform
    - accept-encoding
    - accept-language
    - sec-fetch-site
    - sec-fetch-mode
    - sec-fetch-dest
    - content-type
    - accept
    - cookie

admin:
  # 管理端登录会话有效期，单位分钟。
  session_ttl_minutes: 1440
  # 首次启动创建的默认管理员账号。default_password 必须改成至少 12 位的非默认密码。
  default_username: admin@cpr.local
  default_password: ''

logging:
  # Docker 部署默认写入 /app/logs，由 Compose 挂载到仓库 .runtime/logs。
  directory: /app/logs
  # 日志保留天数。
  retention_days: 14
  enabled: true
