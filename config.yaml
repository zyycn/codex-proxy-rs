server:
  host: 0.0.0.0
  port: 8080
api:
  base_url: https://chatgpt.com/backend-api
model:
  default: gpt-5.5
  default_reasoning_effort: null
  default_service_tier: null
  aliases: {}
auth:
  refresh_margin_seconds: 300
  refresh_enabled: true
  refresh_concurrency: 2
  max_concurrent_per_account: 3
  request_interval_ms: 50
  rotation_strategy: least_used
  tier_priority: []
  oauth_client_id: app_EMoamEEZ73f0CkXaXp7hrann
  oauth_auth_endpoint: https://auth.openai.com/oauth/authorize
  oauth_token_endpoint: https://auth.openai.com/oauth/token
quota:
  refresh_interval_minutes: 5
  warning_thresholds:
    primary:
      - 80
      - 90
    secondary:
      - 80
      - 90
  skip_exhausted: true
usage_stats:
  history_retention_days: null
database:
  url: sqlite://data/codex-proxy-rs.sqlite
security:
  master_key_file: data/master.key
  api_key_pepper_file: data/api-key-pepper.key
tls:
  force_http11: false
ws_pool:
  enabled: true
  max_age_ms: 3300000
  max_per_account: 8
admin:
  session_ttl_minutes: 1440
  default_username: admin
  default_password: admin
logging:
  directory: logs
  retention_days: 14
  enabled: false
  capacity: 2000
  capture_body: false
