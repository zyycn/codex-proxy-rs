server:
  host: '0.0.0.0'
  port: 8080
api:
  base_url: 'https://chatgpt.com/backend-api'
database:
  url: 'sqlite://.runtime/data/codex-proxy-rs.sqlite'
tls:
  force_http11: false
ws_pool:
  enabled: true
  max_age_ms: 3300000
  max_per_account: 8
fingerprint:
  originator: Codex Desktop
  app_version: '26.623.42026'
  build_number: '4514'
  platform: darwin
  arch: arm64
  chromium_version: '146'
  user_agent_template: Codex Desktop/{version} ({platform}; {arch})
  default_headers:
    - name: Accept-Encoding
      value: gzip, deflate, br, zstd
    - name: Accept-Language
      value: en-US,en;q=0.9
    - name: sec-ch-ua-mobile
      value: '?0'
    - name: sec-ch-ua-platform
      value: '"macOS"'
    - name: sec-fetch-site
      value: same-origin
    - name: sec-fetch-mode
      value: cors
    - name: sec-fetch-dest
      value: empty
  header_order:
    - authorization
    - chatgpt-account-id
    - originator
    - x-openai-internal-codex-residency
    - x-client-request-id
    - x-codex-installation-id
    - x-codex-turn-state
    - openai-beta
    - user-agent
    - sec-ch-ua
    - sec-ch-ua-mobile
    - sec-ch-ua-platform
    - accept-encoding
    - accept-language
    - sec-fetch-site
    - sec-fetch-mode
    - sec-fetch-dest
    - content-type
    - accept
    - cookie
admin:
  session_ttl_minutes: 1440
  session_cleanup_interval_secs: 3600
  default_username: admin
  default_password: admin
logging:
  directory: .runtime/logs
  retention_days: 14
  enabled: true
